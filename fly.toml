# Fly.io configuration for naimed-kepler-bot
# Deploy with: fly deploy
# Docs: https://fly.io/docs/reference/configuration/

app = "naimed-kepler-bot"
primary_region = "nrt" # Tokyo — closest to Korea

[build]

[env]
  DATABASE_PATH = "/app/data/kepler_bot.db"

# Discord bot only makes outbound connections — no HTTP server needed
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "bot_data"
  destination = "/app/data"
  initial_size = "1gb"
